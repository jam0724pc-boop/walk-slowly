<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ぴったり ウォーク！</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#7ad7ff;
    --sky-mid:#3ea8f0;
    --sky-bot:#1f6fd6;
    --grass:#8bd14a;
    --grass-deep:#4e9a25;
    --path:#f6d98a;
    --path-deep:#c79a3e;
    --sun:#ffd34d;
    --gold:#ffc01e;
    --red:#ff5a5a;
    --red-deep:#cf2b2b;
    --cream:#fff7e6;
    --ink:#3a2f6b;
    --ink-soft:#5b4fa0;
    --star:#ffdf3d;
    --shadow:rgba(38,28,80,.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; padding:0; overflow:hidden;}
  body{
    font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN",sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 55%,var(--sky-bot) 100%);
    user-select:none; -webkit-user-select:none;
    touch-action:manipulation;
  }
  #app{position:fixed; inset:0; overflow:hidden;}

  /* ---------- shared parts ---------- */
  .screen{position:absolute; inset:0; display:flex; flex-direction:column;}
  .hidden{display:none !important;}

  .display-font{font-family:"Mochiy Pop One","M PLUS Rounded 1c",sans-serif;}

  .glossy-btn{
    font-family:"Mochiy Pop One","M PLUS Rounded 1c",sans-serif;
    border:none; cursor:pointer; color:#fff;
    border-radius:24px; position:relative;
    text-shadow:0 2px 0 var(--ink), 0 4px 6px rgba(0,0,0,.25);
    box-shadow:0 8px 0 rgba(0,0,0,.25), inset 0 4px 8px rgba(255,255,255,.65), inset 0 -8px 14px rgba(0,0,0,.18);
    transition:transform .08s ease, box-shadow .08s ease;
    padding:18px 26px;
  }
  .glossy-btn:active{transform:translateY(6px); box-shadow:0 2px 0 rgba(0,0,0,.25), inset 0 4px 8px rgba(255,255,255,.55), inset 0 -6px 12px rgba(0,0,0,.2);}
  .glossy-btn:focus-visible{outline:5px solid #fff; outline-offset:4px;}

  /* clouds */
  .cloud{position:absolute; background:#fff; border-radius:50%; opacity:.9; filter:drop-shadow(0 6px 0 rgba(0,0,0,.05));}
  .cloud::before,.cloud::after{content:""; position:absolute; background:#fff; border-radius:50%;}

  /* ================= TITLE ================= */
  #title{justify-content:flex-start; align-items:center; padding:2.2vh 2vw; text-align:center;}
  .sky-deco{position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0;}
  .title-inner{position:relative; z-index:2; width:100%; display:flex; flex-direction:column; align-items:center; height:100%;}
  .game-logo{
    font-family:"Mochiy Pop One",sans-serif;
    font-size:clamp(34px,6.4vmin,72px);
    color:var(--gold);
    -webkit-text-stroke:6px var(--ink);
    paint-order:stroke fill;
    text-shadow:0 6px 0 var(--ink), 0 10px 14px rgba(0,0,0,.25);
    letter-spacing:.04em; margin:.4vh 0 0;
    transform:rotate(-1.5deg);
    animation:logoPop .8s cubic-bezier(.2,1.4,.5,1) both;
  }
  @keyframes logoPop{0%{transform:scale(.4) rotate(-12deg); opacity:0;} 100%{transform:scale(1) rotate(-1.5deg); opacity:1;}}
  .logo-mushroom{display:inline-block; animation:bob 1.4s ease-in-out infinite;}
  .subtitle{
    font-weight:800; font-size:clamp(13px,2.1vmin,21px); color:#fff;
    background:rgba(58,47,107,.55); padding:6px 18px; border-radius:999px;
    margin:1vh 0 .4vh; text-shadow:0 1px 2px rgba(0,0,0,.4);
  }
  .howto{
    max-width:1000px; font-weight:700; font-size:clamp(11px,1.7vmin,16px);
    color:var(--ink); background:rgba(255,255,255,.78); border:3px solid #fff;
    border-radius:18px; padding:8px 18px; margin:.3vh 0 1vh; line-height:1.5;
    box-shadow:0 4px 0 var(--shadow);
  }
  .level-prompt{font-family:"Mochiy Pop One",sans-serif; color:#fff; font-size:clamp(14px,2.4vmin,24px); text-shadow:0 2px 0 var(--ink); margin-bottom:.6vh;}
  .levels{display:flex; gap:1.2vw; justify-content:center; align-items:stretch; width:100%; flex:1; padding:0 1vw 1vh;}
  .level-card{
    flex:1 1 0; max-width:230px; min-width:0;
    border-radius:22px; padding:1.2vh 1vw; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:.4vh;
    color:#fff; position:relative; overflow:hidden;
    border:4px solid rgba(255,255,255,.85);
    box-shadow:0 9px 0 var(--shadow), inset 0 4px 10px rgba(255,255,255,.5), inset 0 -10px 18px rgba(0,0,0,.18);
    transition:transform .12s ease, box-shadow .12s ease;
    animation:cardIn .5s ease both;
  }
  .level-card:nth-child(1){animation-delay:.05s;}
  .level-card:nth-child(2){animation-delay:.12s;}
  .level-card:nth-child(3){animation-delay:.19s;}
  .level-card:nth-child(4){animation-delay:.26s;}
  .level-card:nth-child(5){animation-delay:.33s;}
  @keyframes cardIn{from{opacity:0; transform:translateY(30px);} to{opacity:1; transform:translateY(0);}}
  .level-card:hover{transform:translateY(-6px);}
  .level-card:active{transform:translateY(3px); box-shadow:0 4px 0 var(--shadow), inset 0 4px 10px rgba(255,255,255,.5);}
  .level-card:focus-visible{outline:5px solid #fff; outline-offset:3px;}
  .lc-shine{position:absolute; top:-30%; left:-20%; width:60%; height:160%; background:linear-gradient(120deg,rgba(255,255,255,.55),rgba(255,255,255,0)); transform:rotate(18deg); pointer-events:none;}
  .lc-badge{font-family:"Mochiy Pop One",sans-serif; font-size:clamp(13px,2vmin,20px); background:rgba(0,0,0,.22); padding:2px 12px; border-radius:999px; text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .lc-emoji{font-size:clamp(34px,6vmin,60px); line-height:1; filter:drop-shadow(0 4px 4px rgba(0,0,0,.3)); margin:.2vh 0;}
  .lc-name{font-family:"Mochiy Pop One",sans-serif; font-size:clamp(13px,2vmin,21px); text-shadow:0 2px 0 rgba(0,0,0,.35); line-height:1.15;}
  .lc-info{font-weight:800; font-size:clamp(10px,1.55vmin,14px); background:rgba(255,255,255,.92); color:var(--ink); border-radius:12px; padding:5px 8px; width:100%; line-height:1.45; text-shadow:none; box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .lc-info b{color:var(--red-deep);}
  .lc-note{font-weight:800; font-size:clamp(9px,1.35vmin,12px); color:#fff; background:rgba(0,0,0,.28); border-radius:10px; padding:3px 7px; line-height:1.35; text-shadow:0 1px 1px rgba(0,0,0,.5);}

  .corner-tools{position:absolute; top:1.4vh; right:1.4vw; z-index:5; display:flex; gap:10px;}
  .tool-btn{
    font-size:clamp(16px,2.6vmin,24px); width:clamp(42px,6vmin,58px); height:clamp(42px,6vmin,58px);
    border-radius:50%; padding:0; background:linear-gradient(180deg,#fff,#e8e2ff); color:var(--ink);
    box-shadow:0 5px 0 var(--shadow), inset 0 3px 6px rgba(255,255,255,.8);
    border:3px solid #fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-family:"M PLUS Rounded 1c";
  }
  .tool-btn:active{transform:translateY(4px); box-shadow:0 1px 0 var(--shadow);}

  /* ================= GAME ================= */
  #game{display:grid; grid-template-columns:3fr 1fr;}
  .track-area{position:relative; overflow:hidden; border-right:8px solid rgba(58,47,107,.25);
    background:linear-gradient(180deg,#bdf0a0 0%,#86cf52 100%);}
  .track-deco{position:absolute; inset:0; z-index:0; pointer-events:none;}

  /* すごろくの クネクネ道 と マス */
  .road{position:absolute; inset:0; z-index:1; pointer-events:none;}
  .road-outline{stroke:var(--ro,#9c6b2f); stroke-width:var(--rwo,50px); stroke-linecap:round; stroke-linejoin:round;}
  .road-top{stroke:var(--rt,#f2d391); stroke-width:var(--rwt,40px); stroke-linecap:round; stroke-linejoin:round;}
  .board{position:absolute; inset:0; z-index:2; pointer-events:none;}
  .tile{position:absolute; width:clamp(30px,4.8vmin,50px); height:clamp(30px,4.8vmin,50px);
    transform:translate(-50%,-50%); border-radius:50%; z-index:2; opacity:.5;
    background:radial-gradient(circle at 50% 32%,#fff,#ece7da 60%,#d3ccba);
    border:3px solid rgba(255,255,255,.7); box-shadow:0 3px 0 rgba(80,55,15,.25), inset 0 2px 4px rgba(255,255,255,.5);}
  .tile.lit{opacity:1; border-color:#fff; background:radial-gradient(circle at 50% 32%,#fff,#ffd34d 58%,#e8a200);}
  .tile.alt.lit{background:radial-gradient(circle at 50% 32%,#fff,#8fd0ff 58%,#3a9be8);}
  .tile.start{opacity:1; background:radial-gradient(circle at 50% 32%,#fff,#9be06a 58%,#4e9a25);}
  .tile.goal{opacity:1; background:radial-gradient(circle at 50% 32%,#fff,#ff8a8a 58%,#e23b3b);}
  .tile.bonus::after{content:"⭐"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:clamp(14px,2.6vmin,28px); filter:drop-shadow(0 1px 1px rgba(0,0,0,.3));}
  .tile.missed{opacity:.95; border-color:#ececf0; background:radial-gradient(circle at 50% 32%,#fff,#bcbfc9 55%,#7e8290); animation:none;}
  .tile.missed::after{content:"✕"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:"Mochiy Pop One"; color:#e23b3b; font-size:clamp(15px,2.6vmin,26px);}
  .tile .tile-icon{position:absolute; top:-1.45em; left:50%; transform:translateX(-50%); font-size:clamp(20px,3.4vmin,34px); filter:drop-shadow(0 2px 2px rgba(0,0,0,.3)); animation:wave 1.6s ease-in-out infinite;}
  .tile .tile-label{position:absolute; bottom:-1.4em; left:50%; transform:translateX(-50%); white-space:nowrap;
    font-family:"Mochiy Pop One"; font-size:clamp(9px,1.4vmin,13px); color:#fff; background:rgba(58,47,107,.7);
    border-radius:999px; padding:1px 8px; text-shadow:0 1px 1px rgba(0,0,0,.4);}
  @keyframes wave{0%,100%{transform:translateX(-50%) rotate(-5deg);}50%{transform:translateX(-50%) rotate(7deg);}}
  .tile.lit{animation:tileLit .42s ease forwards, glowPulse 2s ease-in-out .55s infinite;}
  @keyframes tileLit{0%{transform:translate(-50%,-50%) scale(1);}
    45%{transform:translate(-50%,-50%) scale(1.4); box-shadow:0 0 0 7px rgba(255,255,255,.55),0 3px 0 rgba(80,55,15,.3);}
    100%{transform:translate(-50%,-50%) scale(1.12); box-shadow:0 0 0 3px rgba(255,255,255,.75),0 3px 0 rgba(80,55,15,.3);}}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 0 3px rgba(255,255,255,.75),0 0 10px 2px rgba(255,240,160,.5),0 3px 0 rgba(80,55,15,.3);}
    50%{box-shadow:0 0 0 3px rgba(255,255,255,.95),0 0 22px 9px rgba(255,240,160,.85),0 3px 0 rgba(80,55,15,.3);}}

  /* ひかりの たま（道を ながれる 光） */
  .runner{position:absolute; width:clamp(14px,2.4vmin,26px); height:clamp(14px,2.4vmin,26px); border-radius:50%;
    transform:translate(-50%,-50%); z-index:3; opacity:0; pointer-events:none;
    background:radial-gradient(circle,#fff 0%,#ffe98a 55%,rgba(255,217,77,0) 75%);
    box-shadow:0 0 16px 7px rgba(255,232,130,.85);}
  .runner.on{opacity:1;}

  /* 道ばたの かざり */
  .deco-emoji{position:absolute; transform:translate(-50%,-50%); z-index:0;
    font-size:clamp(26px,4.6vmin,52px); filter:drop-shadow(0 3px 3px rgba(0,0,0,.25)); opacity:.92;
    animation:decoFloat 3.4s ease-in-out infinite;}
  @keyframes decoFloat{0%,100%{transform:translate(-50%,-50%) translateY(0);}50%{transform:translate(-50%,-50%) translateY(-8px);}}

  /* おうえん キャラ */
  .buddy{position:absolute; top:2%; left:1.5%; z-index:6; display:flex; align-items:flex-start; gap:6px;}
  .buddy-face{font-size:clamp(36px,6.4vmin,68px); line-height:1; filter:drop-shadow(0 4px 4px rgba(0,0,0,.3));
    animation:buddyBob 1s ease-in-out infinite; transform-origin:bottom center;}
  @keyframes buddyBob{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-9%) rotate(4deg);}}
  .buddy.shock .buddy-face{animation:buddyShake .45s ease;}
  @keyframes buddyShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px) rotate(-8deg);}40%{transform:translateX(7px) rotate(8deg);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
  .buddy-bubble{font-family:"Mochiy Pop One"; font-size:clamp(11px,1.7vmin,17px); color:var(--ink); background:#fff;
    border:2px solid #fff; border-radius:14px; padding:4px 12px; box-shadow:0 3px 0 var(--shadow); margin-top:4px;
    opacity:0; transform:scale(.6); transform-origin:left center; transition:all .18s ease; white-space:nowrap;}
  .buddy-bubble.show{opacity:1; transform:scale(1);}

  /* 花火 */
  .fw-p{position:absolute; width:10px; height:10px; border-radius:50%; z-index:7; pointer-events:none;
    transform:translate(-50%,-50%); animation:fwFly .95s ease-out forwards; box-shadow:0 0 8px 2px rgba(255,255,255,.5);}
  @keyframes fwFly{0%{transform:translate(-50%,-50%) scale(1); opacity:1;}
    100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.25); opacity:0;}}

  /* 虹 */
  .rainbow-wrap{position:absolute; left:50%; bottom:14%; transform:translateX(-50%); z-index:6; pointer-events:none;
    width:min(70vmin,640px); height:min(35vmin,320px); overflow:hidden; animation:rbIn .8s ease both;}
  .rainbow{width:100%; height:200%; border-radius:50%; opacity:.92;
    box-shadow:inset 0 0 0 1.2vmin #ff5a5a, inset 0 0 0 2.4vmin #ff9a3c, inset 0 0 0 3.6vmin #ffd34d,
               inset 0 0 0 4.8vmin #7bd14a, inset 0 0 0 6vmin #5ec4ff, inset 0 0 0 7.2vmin #a05bff;}
  @keyframes rbIn{from{opacity:0; transform:translateX(-50%) translateY(40px);}to{opacity:1; transform:translateX(-50%) translateY(0);}}

  .beat-hud{position:absolute; top:2.5%; left:50%; transform:translateX(-50%); z-index:5; display:flex; align-items:center; gap:14px;
    background:rgba(58,47,107,.7); padding:6px 18px 6px 10px; border-radius:999px; border:3px solid #fff; box-shadow:0 4px 0 var(--shadow);}
  .met-icon{font-size:clamp(24px,4vmin,40px); animation:metPulse .857s ease-in-out infinite; transform-origin:bottom center;}
  @keyframes metPulse{0%,100%{transform:rotate(-12deg);}50%{transform:rotate(12deg);}}
  .beat-text{font-family:"Mochiy Pop One"; color:#fff; font-size:clamp(12px,1.9vmin,18px); text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .beat-ring{width:clamp(16px,2.6vmin,26px); height:clamp(16px,2.6vmin,26px); border-radius:50%; background:var(--sun); box-shadow:0 0 0 3px #fff; animation:ringPulse .857s ease-in-out infinite;}
  @keyframes ringPulse{0%,100%{transform:scale(.6); opacity:.6;}50%{transform:scale(1.15); opacity:1;}}

  .child-hint{position:absolute; bottom:2%; left:50%; transform:translateX(-50%); z-index:5; white-space:nowrap;
    font-family:"Mochiy Pop One"; font-size:clamp(11px,1.8vmin,18px); color:#fff;
    background:rgba(58,47,107,.55); padding:4px 16px; border-radius:999px; text-shadow:0 1px 2px rgba(0,0,0,.4);}

  /* teacher panel */
  .teacher-area{background:linear-gradient(180deg,#fff7e6,#ffe7c2); display:flex; flex-direction:column; align-items:center;
    padding:1.4vh 1vw; gap:1vh; border-left:6px solid #fff;}
  .round-badge{font-family:"Mochiy Pop One"; font-size:clamp(13px,2vmin,20px); color:#fff; background:var(--ink-soft);
    border:3px solid #fff; border-radius:999px; padding:4px 16px; box-shadow:0 4px 0 var(--shadow); text-align:center;}
  .timer-wrap{text-align:center; width:100%;}
  .timer-label{font-weight:800; font-size:clamp(11px,1.6vmin,15px); color:var(--ink-soft);}
  .timer-num{font-family:"Mochiy Pop One"; font-size:clamp(34px,7vmin,68px); line-height:1; color:var(--ink);
    text-shadow:0 3px 0 rgba(255,255,255,.9), 0 5px 6px rgba(0,0,0,.12);}
  .timer-bar{width:90%; height:14px; margin:6px auto 0; background:#e3d3ad; border-radius:999px; overflow:hidden; border:2px solid #fff; box-shadow:inset 0 2px 4px rgba(0,0,0,.2);}
  .timer-fill{height:100%; width:100%; background:linear-gradient(90deg,#7bd14a,#ffd34d 60%,#ff8a4d); border-radius:999px; transition:width .12s linear;}
  .score-box{text-align:center;}
  .score-label{font-weight:800; font-size:clamp(11px,1.6vmin,15px); color:var(--ink-soft);}
  .score-num{font-family:"Mochiy Pop One"; font-size:clamp(26px,4.5vmin,46px); color:var(--red-deep); line-height:1;}
  .score-num.star{color:#e8a200;}

  .zure-btn{
    flex:1; width:100%; margin-top:.4vh;
    background:radial-gradient(circle at 50% 28%,#ff8a8a 0%,#ff5a5a 45%,#d22b2b 100%);
    border:6px solid #fff; border-radius:28px; color:#fff;
    font-family:"Mochiy Pop One"; cursor:pointer; position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    box-shadow:0 12px 0 #9c1f1f, inset 0 8px 16px rgba(255,255,255,.55), inset 0 -14px 22px rgba(0,0,0,.28);
    transition:transform .06s ease, box-shadow .06s ease;
    text-shadow:0 3px 0 #9c1f1f, 0 5px 8px rgba(0,0,0,.3);
  }
  .zure-btn:active,.zure-btn.squish{transform:translateY(8px) scale(.985); box-shadow:0 3px 0 #9c1f1f, inset 0 8px 16px rgba(255,255,255,.5), inset 0 -10px 18px rgba(0,0,0,.3);}
  .zure-btn:focus-visible{outline:6px solid var(--ink); outline-offset:4px;}
  .zb-big{font-size:clamp(34px,6.2vmin,64px); line-height:1;}
  .zb-icon{font-size:clamp(30px,5.2vmin,54px); line-height:1;}
  .zb-sub{font-size:clamp(11px,1.7vmin,17px); background:rgba(0,0,0,.22); padding:3px 14px; border-radius:999px;}
  .zb-shine{position:absolute; top:-30%; left:-25%; width:55%; height:160%; background:linear-gradient(120deg,rgba(255,255,255,.45),transparent); transform:rotate(18deg); pointer-events:none;}

  .quit-btn{width:100%; background:linear-gradient(180deg,#b7add9,#8f83c0); font-size:clamp(12px,1.8vmin,17px); padding:8px; border-radius:16px;}

  /* press float + flash */
  #flash{position:fixed; inset:0; background:#ff2d2d; opacity:0; pointer-events:none; z-index:60;}
  #flash.go{animation:flashAnim .4s ease;}
  @keyframes flashAnim{0%{opacity:0;}18%{opacity:.6;}100%{opacity:0;}}
  .float-zure{position:absolute; z-index:9; font-family:"Mochiy Pop One"; color:#fff; -webkit-text-stroke:4px var(--red-deep); paint-order:stroke fill;
    font-size:clamp(26px,5vmin,52px); pointer-events:none; animation:floatUp .9s ease-out forwards; text-shadow:0 4px 8px rgba(0,0,0,.3);}
  @keyframes floatUp{0%{transform:translate(-50%,0) scale(.4); opacity:0;}25%{transform:translate(-50%,-30px) scale(1.15); opacity:1;}100%{transform:translate(-50%,-130px) scale(1); opacity:0;}}

  /* countdown */
  #countdown{position:fixed; inset:0; z-index:70; display:flex; align-items:center; justify-content:center; pointer-events:none;}
  .cd-num{font-family:"Mochiy Pop One"; font-size:clamp(120px,30vmin,300px); color:var(--sun);
    -webkit-text-stroke:10px var(--ink); paint-order:stroke fill; text-shadow:0 10px 0 var(--ink);}
  .cd-pop{animation:cdPop .8s ease both;}
  @keyframes cdPop{0%{transform:scale(.2); opacity:0;}30%{transform:scale(1.15); opacity:1;}70%{transform:scale(1);}100%{transform:scale(1.6); opacity:0;}}

  /* ================= RESULT ================= */
  #result{position:fixed; inset:0; z-index:80; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 35%,rgba(60,40,140,.55),rgba(20,12,60,.8));}
  .result-card{position:relative; width:min(74vw,820px); max-height:92vh; overflow:hidden; text-align:center;
    background:linear-gradient(180deg,#fffdf6,#ffeec2); border:8px solid #fff; border-radius:34px;
    box-shadow:0 18px 0 rgba(0,0,0,.3), inset 0 6px 14px rgba(255,255,255,.7); padding:2.4vh 3vw;
    animation:resultIn .5s cubic-bezier(.2,1.4,.5,1) both;}
  @keyframes resultIn{from{transform:scale(.6); opacity:0;}to{transform:scale(1); opacity:1;}}
  .res-round{font-family:"Mochiy Pop One"; font-size:clamp(15px,2.4vmin,24px); color:var(--ink-soft);}
  .res-title{font-family:"Mochiy Pop One"; font-size:clamp(30px,6vmin,68px); margin:.4vh 0; line-height:1;}
  .res-title.win{color:var(--gold); -webkit-text-stroke:5px var(--ink); paint-order:stroke fill; text-shadow:0 6px 0 var(--ink);}
  .res-title.lose{color:var(--ink-soft);}

/* ============================================================
   Web Audio エンジン
   ============================================================ */
var actx=null, master=null, musicGain=null, metGain=null, sfxGain=null, muted=false;

function ensureAudio(){
  if(!actx){
    var AC = window.AudioContext || window.webkitAudioContext;
    actx = new AC();
    master = actx.createGain(); master.gain.value = muted?0:0.9; master.connect(actx.destination);
    musicGain = actx.createGain(); musicGain.gain.value = 0.45; musicGain.connect(master);
    metGain = actx.createGain(); metGain.gain.value = 1.0; metGain.connect(master);
    sfxGain = actx.createGain(); sfxGain.gain.value = 0.8; sfxGain.connect(master);
  }
  if(actx.state === "suspended"){ actx.resume(); }
}

function n2f(name){
  var m = /^([A-G])(#?)(-?\d)$/.exec(name);
  if(!m) return 440;
  var base = {C:-9,D:-7,E:-5,F:-4,G:-2,A:0,B:2}[m[1]];
  var sharp = m[2] ? 1 : 0;
  var oct = parseInt(m[3],10) - 4;
  var semis = base + sharp + oct*12;
  return 440 * Math.pow(2, semis/12);
}

function tone(freq, time, dur, type, vol, dest){
  if(!actx) return;
  var o = actx.createOscillator();
  var g = actx.createGain();
  o.type = type || "square";
  o.frequency.setValueAtTime(freq, time);
  g.gain.setValueAtTime(0.0001, time);
  g.gain.linearRampToValueAtTime(vol, time+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, time+dur);
  o.connect(g); g.connect(dest || master);
  o.start(time); o.stop(time+dur+0.03);
}

/* メトロノーム = はっきり聞こえる明るいクリック */
function tick(time){
  if(!actx) return;
  var o = actx.createOscillator();
  var g = actx.createGain();
  o.type = "triangle";
  o.frequency.setValueAtTime(1700, time);
  o.frequency.exponentialRampToValueAtTime(950, time+0.04);
  g.gain.setValueAtTime(0.0001, time);
  g.gain.exponentialRampToValueAtTime(0.9, time+0.004);
  g.gain.exponentialRampToValueAtTime(0.0001, time+0.09);
  o.connect(g); g.connect(metGain);
  o.start(time); o.stop(time+0.12);
  // 高音のアタックを重ねて抜けを良くする
  var o2 = actx.createOscillator();
  var g2 = actx.createGain();
  o2.type = "square";
  o2.frequency.setValueAtTime(2600, time);
  g2.gain.setValueAtTime(0.0001, time);
  g2.gain.exponentialRampToValueAtTime(0.35, time+0.003);
  g2.gain.exponentialRampToValueAtTime(0.0001, time+0.04);
  o2.connect(g2); g2.connect(metGain);
  o2.start(time); o2.stop(time+0.06);
}

/* ブッブー（不正解音） */
function buzzer(){
  if(!actx) return;
  var t = actx.currentTime + 0.01;
  tone(196, t, 0.16, "sawtooth", 0.55, sfxGain);
  tone(146.83, t+0.15, 0.30, "sawtooth", 0.55, sfxGain);
}

/* ファンファーレ（クリア時） */
function fanfare(){
  if(!actx) return;
  var t = actx.currentTime + 0.05;
  var seq = [["G4",0],["C5",.12],["E5",.24],["G5",.36],["C6",.5],["G5",.62],["C6",.74]];
  for(var i=0;i<seq.length;i++){ tone(n2f(seq[i][0]), t+seq[i][1], 0.4, "square", 0.4, sfxGain); }
  var chord = ["C5","E5","G5","C6"];
  for(var j=0;j<chord.length;j++){ tone(n2f(chord[j]), t+0.92, 1.4, "square", 0.3, sfxGain); }
  // キラキラ
  for(var k=0;k<6;k++){ tone(n2f("C6")*(1+k*0.12), t+1.0+k*0.05, 0.2, "triangle", 0.15, sfxGain); }
}

/* やさしい終了音（クリアできなかったとき・はげまし） */
function softEnd(){
  if(!actx) return;
  var t = actx.currentTime + 0.05;
  tone(n2f("E5"), t, 0.25, "triangle", 0.3, sfxGain);
  tone(n2f("G5"), t+0.22, 0.25, "triangle", 0.3, sfxGain);
  tone(n2f("C6"), t+0.44, 0.5, "triangle", 0.3, sfxGain);
}

/* コイン音（ボーナスマス ⭐） */
function coin(){
  if(!actx) return;
  var t = actx.currentTime + 0.01;
  tone(n2f("B5"), t, 0.09, "square", 0.3, sfxGain);
  tone(n2f("E6"), t + 0.085, 0.4, "square", 0.3, sfxGain);
}

/* ゴールの ジングル */
function goalJingle(){
  if(!actx) return;
  var t = actx.currentTime + 0.02;
  var seq = ["C5","E5","G5","C6","E6","G6"];
  for(var i=0; i<seq.length; i++){ tone(n2f(seq[i]), t + i*0.09, 0.35, "square", 0.3, sfxGain); }
}

/* カウントダウン用ビープ */
function beep(hi){
  if(!actx) return;
  var t = actx.currentTime + 0.01;
  tone(hi ? n2f("C6") : n2f("G5"), t, hi?0.35:0.18, "square", 0.4, sfxGain);
}

/* ============================================================
   スケジューラ（メトロノーム + BGM）
   ============================================================ */
var schedTimer=null;
var metTime=0, leadTime=0, bassTime=0, leadIdx=0, bassIdx=0, metBeat=0;

function startScheduler(){
  var startAt = actx.currentTime + 0.12;
  metTime = leadTime = bassTime = startAt;
  leadIdx = bassIdx = metBeat = 0;
  schedTimer = setInterval(function(){
    if(!actx) return;
    var ahead = actx.currentTime + 0.18;
    var metStep = 60 / level.bpm;
    while(metTime < ahead){
      tick(metTime);
      // メトロノームの 拍 に あわせて、男の子が つぎの マスへ ホップ
      (function(t, idx){
        setTimeout(function(){ if(running){ lightTile(idx); } }, Math.max(0, (t - actx.currentTime) * 1000));
      })(metTime, metBeat);
      metTime += metStep; metBeat++;
    }
    var beatLen = 60 / level.bgm.tempo;
    var lead = level.bgm.lead, bass = level.bgm.bass;
    while(leadTime < ahead){
      var ln = lead[leadIdx % lead.length];
      if(ln.n){ tone(n2f(ln.n), leadTime, beatLen*ln.d*0.9, level.bgm.leadType, (ln.v||0.16), musicGain); }
      leadTime += beatLen*ln.d; leadIdx++;
    }
    while(bassTime < ahead){
      var bn = bass[bassIdx % bass.length];
      if(bn.n){ tone(n2f(bn.n), bassTime, beatLen*bn.d*0.95, level.bgm.bassType, (bn.v||0.2), musicGain); }
      bassTime += beatLen*bn.d; bassIdx++;
    }
  }, 25);
}
function stopScheduler(){ if(schedTimer){ clearInterval(schedTimer); schedTimer=null; } }

        '<div class="lc-name">'+lv.name+'</div>'+
        '<div class="lc-info">スピード：'+lv.speedLabel+'<br>♩ = '+lv.bpm+'　🎶 '+lv.mood+'<br>クリア：<b>'+lv.clear+'% いじょう</b></div>'+
        note;
      card.addEventListener("click", function(){ selectLevel(lv); });
      wrap.appendChild(card);
    })(LEVELS[L]);
  }
}

/* ============================================================
   レベル選択 → セッション開始
   ============================================================ */
function selectLevel(lv){
  ensureAudio();           // ユーザー操作のタイミングで音声を有効化
  level = lv;
  session = { levelId:lv.id, round:1, results:[] };
  startGame();
}

/* ============================================================
   1ラウンド開始
   ============================================================ */
function startGame(){
  showScreen("game");
  missedCount = 0;
  elScore.textContent = "0";
  starsGot = 0;
  elStarNum.textContent = "0";
  $("buddyBubble").classList.remove("show");
  var olds = elTrack.querySelectorAll(".fw-p,.rainbow-wrap");
  for(var oi=0; oi<olds.length; oi++){ if(olds[oi].parentNode){ olds[oi].parentNode.removeChild(olds[oi]); } }
  elRound.textContent = session.round + "かいめ / 5かい";
  elTimerNum.textContent = DURATION;
  elTimerFill.style.width = "100%";

  // メトロノームの 見た目（拍）の はやさ
  var beatSec = (60 / level.bpm);
  elMet.style.animationDuration = beatSec + "s";
  elBeatRing.style.animationDuration = beatSec + "s";

  buildBoard();   // すごろくの 道と マスを つくる（さいしょは ぜんぶ 消えている）

  // 背景の色をレベルの雰囲気に合わせる
  paintTrackMood();

  // カウントダウン → 本番
  countdown(function(){
    ensureAudio();
    audioStart = actx.currentTime;
    running = true;
    startScheduler();
    requestAnimationFrame(loop);
  });
}

function paintTrackMood(){
  var th = THEMES[level.id] || THEMES[1];
  elTrack.style.background = th.bg;
  elRoad.style.setProperty("--ro", th.ro);
  elRoad.style.setProperty("--rt", th.rt);

  // 道ばたの かざり（テーマの 絵文字）
  var deco = $("trackDeco");
  deco.innerHTML = "";
  var spots = [[3,8],[22,9],[68,8],[96,10],[2.5,46],[97.5,42],[8,96],[92,96],[97,72]];
  for(var i=0; i<spots.length; i++){
    var d = document.createElement("div");
    d.className = "deco-emoji";
    d.textContent = th.deco[i % th.deco.length];
    d.style.left = spots[i][0] + "%";
    d.style.top  = spots[i][1] + "%";
    d.style.animationDelay = (i * 0.35) + "s";
    deco.appendChild(d);
  }

  // おうえん キャラも テーマに あわせる
  $("buddyFace").textContent = th.buddy;
}

/* カウントダウン 3-2-1-スタート！ */
function countdown(done){
  elCountdown.classList.remove("hidden");
  var seq = ["3","2","1","スタート！"];
  var i = 0;
  function step(){
    if(i >= seq.length){
      elCountdown.classList.add("hidden");
      elCountdown.innerHTML = "";
      done();
      return;
    }
    elCountdown.innerHTML = '<div class="cd-num cd-pop">'+seq[i]+'</div>';
    beep(i===3);
    i++;
    setTimeout(step, 800);
  }
  step();
}

/* ============================================================
   メインループ
   ============================================================ */
function loop(){
  if(!running) return;
  var el = actx.currentTime - audioStart;
  var p = Math.min(el / DURATION, 1);
  var remain = Math.max(0, Math.ceil(DURATION - el));
  elTimerNum.textContent = remain;
  elTimerFill.style.width = (100 - p*100) + "%";
  if(el >= DURATION){ endRound(); return; }
  requestAnimationFrame(loop);
}

/* ============================================================
   すごろくの クネクネ道 と マスを つくる
   ============================================================ */
function buildBoard(){
  // 道（SVG）と マス（ボード）を いったん から に する
  while(elRoad.firstChild){ elRoad.removeChild(elRoad.firstChild); }
  elBoard.innerHTML = "";
  tiles = [];

  var N = level.bpm;                        // マスの かず = 全歩数（BPMと同数）
  tileMissed = new Array(N);                // ズレた マスの きろく
  for(var k=0; k<N; k++){ tileMissed[k] = false; }

  // マスの数に あわせて 行の数と マスの 大きさを かえる
  var rows = (N <= 12) ? 2 : (N <= 24) ? 3 : (N <= 42) ? 4 : 5;
  var cols = Math.ceil(N / rows);
  var tileSize =
    (N <= 12) ? "clamp(58px,9.5vmin,100px)" :
    (N <= 24) ? "clamp(48px,7.8vmin,82px)"  :
    (N <= 36) ? "clamp(38px,6.2vmin,66px)"  :
                "clamp(32px,5vmin,54px)";
  var roadW = (N <= 12) ? 64 : (N <= 24) ? 54 : (N <= 36) ? 46 : 40;
  elRoad.style.setProperty("--rwo", (roadW + 10) + "px");
  elRoad.style.setProperty("--rwt", roadW + "px");

  // 下は ヒント文と かさならないように あける
  var xL = 8, xR = 92, yT = 22, yB = 82;
  var stepX = cols > 1 ? (xR - xL) / (cols - 1) : 0;
  var stepY = rows > 1 ? (yB - yT) / (rows - 1) : 0;

  for(var i=0; i<N; i++){
    var row = Math.floor(i / cols);
    var ci  = i % cols;
    var col = (row % 2 === 0) ? ci : (cols - 1 - ci);   // 行ごとに おりかえす（クネクネ）
    var x = xL + col * stepX;
    var y = yT + row * stepY;

    var isBonus = (i > 0 && i < N - 1 && i % 5 === 0);   // 5マスごとの ボーナス ⭐
    var t = document.createElement("div");
    t.className = "tile" + (i % 2 === 1 ? " alt" : "") + (isBonus ? " bonus" : "");
    if(i === 0){ t.className = "tile start"; t.innerHTML = '<span class="tile-label">スタート</span>'; }
    if(i === N - 1){ t.className = "tile goal"; t.innerHTML = '<span class="tile-icon">🏁</span><span class="tile-label">ゴール</span>'; }
    t.style.left = x + "%";
    t.style.top  = y + "%";
    t.style.width = tileSize;
    t.style.height = tileSize;
    elBoard.appendChild(t);
    tiles.push({ x:x, y:y, el:t, bonus:isBonus, litDone:false });
  }

  drawRoad();

  // ひかりの たま を スタートに もどす
  var beatSec = 60 / level.bpm;
  var mv = Math.min(beatSec * 0.45, 0.6);
  elRunner.classList.remove("on");
  elRunner.style.transition = "none";
  elRunner.style.left = tiles[0].x + "%";
  elRunner.style.top  = tiles[0].y + "%";
  void elRunner.offsetWidth;
  elRunner.style.transition = "left " + mv + "s ease, top " + mv + "s ease";
}

/* クネクネ道を 画面サイズに あわせて ピクセルで 描く（ズレない） */
function drawRoad(){
  if(!tiles.length) return;
  while(elRoad.firstChild){ elRoad.removeChild(elRoad.firstChild); }
  var w = elTrack.clientWidth, h = elTrack.clientHeight;
  if(!w || !h) return;
  elRoad.setAttribute("viewBox", "0 0 " + w + " " + h);
  elRoad.setAttribute("preserveAspectRatio", "none");
  var pts = tiles.map(function(t){ return (t.x/100*w).toFixed(1) + "," + (t.y/100*h).toFixed(1); }).join(" ");
  ["road-outline","road-top"].forEach(function(cls){
    var pl = document.createElementNS(SVGNS, "polyline");
    pl.setAttribute("points", pts);
    pl.setAttribute("class", cls);
    pl.setAttribute("fill", "none");
    elRoad.appendChild(pl);
  });
}
window.addEventListener("resize", drawRoad);

/* 拍に合わせて i ばんめの マスを 点灯（ズレた マスは 点灯しない） */
function lightTile(i){
  if(i < 0 || i >= tiles.length) return;
  moveRunner(i);                            // 光の たまが 道を ながれて すすむ
  if(tileMissed[i]) return;                 // ズレた ところは ぴかっと しない
  var tl = tiles[i];
  tl.el.classList.remove("lit"); void tl.el.offsetWidth; tl.el.classList.add("lit");
  tl.litDone = true;
  if(tl.bonus){
    starsGot++;
    elStarNum.textContent = String(starsGot);
    coin();
    buddySay("⭐ ゲット！", 1200);
  }
  if(i === tiles.length - 1){ goalCelebrate(); }
}

function moveRunner(i){
  elRunner.classList.add("on");
  elRunner.style.left = tiles[i].x + "%";
  elRunner.style.top  = tiles[i].y + "%";
}

/* おうえん キャラ */
function buddySay(text, ms){
  var b = $("buddyBubble");
  b.textContent = text;
  b.classList.add("show");
  if(buddyTimer) clearTimeout(buddyTimer);
  buddyTimer = setTimeout(function(){ b.classList.remove("show"); }, ms || 1500);
}
function buddyShock(){
  var bd = $("buddy"), f = $("buddyFace");
  bd.classList.remove("shock"); void bd.offsetWidth; bd.classList.add("shock");
  f.textContent = "😲";
  buddySay("あっ！", 900);
  if(buddyFaceTimer) clearTimeout(buddyFaceTimer);
  buddyFaceTimer = setTimeout(function(){ f.textContent = (THEMES[level.id] || THEMES[1]).buddy; }, 700);
}

/* ゴール！ 花火と 虹で おいわい */
function goalCelebrate(){
  goalJingle();
  fireworks();
  showRainbow();
  launchConfetti(50);
  buddySay("やったー！！", 2600);
}
function fireworks(){
  var spots = [[30,32],[65,28],[48,52],[80,50],[18,55]];
  var colors = ["#ffd34d","#ff5a5a","#7bd14a","#5ec4ff","#a05bff","#ff8a4d","#fff"];
  spots.forEach(function(sp, si){
    setTimeout(function(){
      for(var i=0; i<14; i++){
        var pp = document.createElement("div");
        pp.className = "fw-p";
        var ang = (i / 14) * Math.PI * 2;
        var dist = 60 + Math.random() * 80;
        pp.style.setProperty("--dx", (Math.cos(ang) * dist) + "px");
        pp.style.setProperty("--dy", (Math.sin(ang) * dist) + "px");
        pp.style.left = sp[0] + "%";
        pp.style.top  = sp[1] + "%";
        pp.style.background = colors[(si + i) % colors.length];
        elTrack.appendChild(pp);
        (function(node){ setTimeout(function(){ if(node.parentNode){ node.parentNode.removeChild(node); } }, 1100); })(pp);
      }
      if(actx){ tone(700 + Math.random()*500, actx.currentTime + 0.01, 0.25, "triangle", 0.18, sfxGain); }
    }, si * 280);
  });
}
function showRainbow(){
  var wrap = document.createElement("div");
  wrap.className = "rainbow-wrap";
  var r = document.createElement("div");
  r.className = "rainbow";
  wrap.appendChild(r);
  elTrack.appendChild(wrap);
  setTimeout(function(){ if(wrap.parentNode){ wrap.parentNode.removeChild(wrap); } }, 6000);
}

/* いまの拍（＝いま 点いた マス）の ばんごう */
function currentBeatIndex(){
  var el = actx ? (actx.currentTime - audioStart) : 0;
  var idx = Math.floor(el / (60 / level.bpm));
  if(idx < 0) idx = 0;
  if(idx >= tiles.length) idx = tiles.length - 1;
  return idx;
}

/* ============================================================
   先生のボタン操作（ズレた！）
   ============================================================ */
function press(){
  if(!running) return;
  flashRed();
  buzzer();
  var idx = currentBeatIndex();
  if(!tileMissed[idx]){
    tileMissed[idx] = true;
    missedCount++;
    elScore.textContent = String(missedCount);
    var t = tiles[idx].el;
    t.classList.remove("lit");
    t.classList.add("missed");
    if(tiles[idx].bonus && tiles[idx].litDone){
      starsGot = Math.max(0, starsGot - 1);   // ⭐も とりけし
      elStarNum.textContent = String(starsGot);
    }
  }
  floatZureAt(idx);
  buddyShock();
  squish();
}

function flashRed(){
  elFlash.classList.remove("go");
  void elFlash.offsetWidth; // reflow
  elFlash.classList.add("go");
}

function squish(){
  elBtnZure.classList.add("squish");
  setTimeout(function(){ elBtnZure.classList.remove("squish"); }, 130);
}

/* ズレた マスの ところに 「ズレ！」を 出す */
function floatZureAt(idx){
  var rect = tiles[idx].el.getBoundingClientRect();
  var trackRect = elTrack.getBoundingClientRect();
  var f = document.createElement("div");
  f.className = "float-zure";
  f.textContent = "ズレ！";
  f.style.left = (rect.left - trackRect.left + rect.width/2) + "px";
  f.style.top  = (rect.top - trackRect.top) + "px";
  elTrack.appendChild(f);
  setTimeout(function(){ if(f.parentNode){ f.parentNode.removeChild(f); } }, 950);
}

/* ============================================================
   ラウンド終了 → 結果計算
   ============================================================ */
function endRound(){
  running = false;
  stopScheduler();
  var total = level.bpm;                       // 全歩数 = マスの数
  var success = Math.max(0, total - missedCount); // 点いた マスの数
  var rate = Math.round(success / total * 100);
  var cleared = rate >= level.clear;
  session.results.push({ rate:rate, cleared:cleared });
  showRoundResult(rate, cleared, total, success);
}

/* ============================================================
   ラウンド結果画面
   ============================================================ */
function showRoundResult(rate, cleared, total, success){
  var isLast = session.round >= 5;
  var titleHtml, starHtml, msgHtml, btnHtml;

  if(cleared){
    titleHtml = '<div class="res-title win">クリア！</div>';
    starHtml = '<div class="res-star spin">⭐</div>';
    msgHtml = '<div class="res-msg">すごい！ぴったり あるけたね！</div>';
  } else {
    titleHtml = '<div class="res-title lose">おしい！</div>';
    starHtml = '<div class="res-star">👦</div>';
    msgHtml = '<div class="res-msg">よく がんばったね！</div>';
  }

  if(isLast){
    btnHtml = '<button class="glossy-btn btn-final" id="resGoFinal">さいごの けっか を みる ⭐</button>';
  } else {
    btnHtml = '<button class="glossy-btn btn-next" id="resNext">つぎへ すすむ ▶</button>';
  }
  btnHtml += '<button class="glossy-btn btn-title" id="resQuit">タイトルへ</button>';

  elResult.innerHTML =
    '<div class="result-card">'+
      '<div class="res-round">'+session.round+'かいめ / 5かい（'+level.badge+'）</div>'+
      titleHtml + starHtml +
      '<div class="res-rate-label">せいこうりつ</div>'+
      '<div class="res-rate">'+rate+'<small>%</small></div>'+
      '<div class="res-detail">ぜんぶで '+total+'マス　／　ぴかっと '+success+'マス　／　ズレ '+missedCount+'マス　（もくひょう '+level.clear+'%）</div>'+
      '<div class="res-detail">あつめた スター：⭐ × '+starsGot+'</div>'+
      msgHtml +
      '<div class="res-buttons">'+btnHtml+'</div>'+
    '</div>';
  elResult.classList.remove("hidden");

  if(cleared){ fanfare(); launchConfetti(70); } else { softEnd(); }

  var nextBtn = $("resNext");
  if(nextBtn){ nextBtn.addEventListener("click", function(){
    elResult.classList.add("hidden");
    session.round++;
    startGame();
  }); }
  var finalBtn = $("resGoFinal");
  if(finalBtn){ finalBtn.addEventListener("click", function(){
    elResult.classList.add("hidden");
    showFinalResult();
  }); }
  $("resQuit").addEventListener("click", goTitle);
}

/* ============================================================
   最終結果（5回ぶん）
   ============================================================ */
function showFinalResult(){
  var stars = 0, sum = 0;
  for(var i=0;i<session.results.length;i++){
    if(session.results[i].cleared) stars++;
    sum += session.results[i].rate;
  }
  var avg = Math.round(sum / session.results.length);

  var msg, big;
  if(stars === 5){ msg = "パーフェクト！リズムめいじん！"; big = "🏆"; }
  else if(stars >= 3){ msg = "とっても じょうず！"; big = "🌟"; }
  else if(stars >= 1){ msg = "つぎは もっと できるよ！"; big = "😊"; }
  else { msg = "れんしゅう すれば だいじょうぶ！"; big = "💪"; }

  var starsRow = "";
  for(var s=0;s<5;s++){ starsRow += (s < stars) ? "⭐" : "☆"; }

  elResult.innerHTML =
    '<div class="result-card">'+
      '<div class="res-round">けっか はっぴょう！（'+level.badge+'）</div>'+
      '<div class="res-title win">'+big+'</div>'+
      '<div class="res-stars-row">'+starsRow+'</div>'+
      '<div class="res-rate-label">あつめた スター</div>'+
      '<div class="res-rate">'+stars+'<small>/5</small></div>'+
      '<div class="res-detail">へいきん せいこうりつ '+avg+'%</div>'+
      '<div class="res-msg">'+msg+'</div>'+
      '<div class="res-buttons">'+
        '<button class="glossy-btn btn-next" id="finAgain">おなじ レベルで もういちど</button>'+
        '<button class="glossy-btn btn-title" id="finTitle">タイトルへ もどる</button>'+
      '</div>'+
    '</div>';
  elResult.classList.remove("hidden");

  if(stars >= 1){ fanfare(); launchConfetti(40 + stars*30); } else { softEnd(); }

  $("finAgain").addEventListener("click", function(){
    elResult.classList.add("hidden");
    session = { levelId:level.id, round:1, results:[] };
    startGame();
  });
  $("finTitle").addEventListener("click", goTitle);
}

/* ============================================================
   紙吹雪
   ============================================================ */
function launchConfetti(amount){
  var emojis = ["🎉","🎊","⭐","👟","🌟","💛","💙","💚","🧡","❤️","✨"];
  var colors = ["#ffd34d","#ff5a5a","#7bd14a","#5ec4ff","#a05bff","#ff8a4d","#fff"];
  for(var i=0;i<amount;i++){
    var pc = document.createElement("div");
    pc.className = "confetti-pc";
    var useEmoji = Math.random() < 0.5;
    if(useEmoji){
      pc.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      pc.style.fontSize = (16 + Math.random()*22) + "px";
    } else {
      pc.style.width = (8 + Math.random()*10) + "px";
      pc.style.height = (10 + Math.random()*14) + "px";
      pc.style.background = colors[Math.floor(Math.random()*colors.length)];
      pc.style.borderRadius = (Math.random()<0.5?"50%":"3px");
    }
    pc.style.left = (Math.random()*100) + "%";
    var dur = 2.4 + Math.random()*2.2;
    var delay = Math.random()*0.6;
    pc.style.animation = "fall "+dur+"s linear "+delay+"s forwards";
    pc.style.transform = "translateY(-40px) rotate("+(Math.random()*360)+"deg)";
    elConfetti.appendChild(pc);
    (function(node, total){ setTimeout(function(){ if(node.parentNode){ node.parentNode.removeChild(node); } }, total*1000 + 800); })(pc, dur+delay);
  }
}

/* ============================================================
   タイトルへ戻る / 中断
   ============================================================ */
function goTitle(){
  running = false;
  stopScheduler();
  elResult.classList.add("hidden");
  elResult.innerHTML = "";
  showScreen("title");
}

/* ============================================================
   ミュート
   ============================================================ */
function toggleMute(){
  muted = !muted;
  if(master){ master.gain.value = muted ? 0 : 0.9; }
  var b = $("muteBtnTitle");
  if(b){ b.textContent = muted ? "🔇" : "🔊"; }
}

/* ============================================================
   イベント登録
   ============================================================ */
// ボタンは pointerdown で即反応（押し間違い防止＆反応の速さ重視）
elBtnZure.addEventListener("pointerdown", function(e){ e.preventDefault(); press(); });
elBtnZure.addEventListener("contextmenu", function(e){ e.preventDefault(); });
$("quitBtn").addEventListener("click", function(){
  goTitle();
});
$("muteBtnTitle").addEventListener("click", toggleMute);

// キーボード／外付けスイッチの配慮：スペース・矢印キーで「ズレた！」
window.addEventListener("keydown", function(e){
  if(!running) return;
  if(e.code === "Space" || e.key === " " || e.code === "ArrowRight" || e.code === "ArrowUp" || e.code === "ArrowLeft" || e.code === "ArrowDown"){
    e.preventDefault(); press();
  }
});

// 起動
buildTitle();
showScreen("title");
</script>
